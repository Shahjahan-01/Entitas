<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Social Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f0eee8;
      --muted: rgba(240,238,232,0.45);
      --wa:   #25D366;
      --ig:   #E1306C;
      --tt:   #ff2d55;
      --wach: #128C7E;
      --glow-wa:   0 0 40px rgba(37,211,102,0.25);
      --glow-ig:   0 0 40px rgba(225,48,108,0.25);
      --glow-tt:   0 0 40px rgba(255,45,85,0.25);
      --glow-wach: 0 0 40px rgba(18,140,126,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Instrument Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated mesh background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(37,211,102,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(225,48,108,0.07) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 50% 50%, rgba(18,140,126,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0%   { opacity: 0.7; }
      100% { opacity: 1; }
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 48px 24px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      margin-bottom: 24px;
      animation: fadeDown 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      position: relative;
      z-index: 1;
      display: block;
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: linear-gradient(135deg, #25D366, #E1306C, #128C7E, #25D366);
      background-size: 300% 300%;
      animation: ringRotate 3s linear infinite;
      padding: 2px;
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff 0);
      mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff 0);
    }

    @keyframes ringRotate {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Profile info */
    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.75rem;
      letter-spacing: -0.03em;
      text-align: center;
      animation: fadeDown 0.7s 0.1s cubic-bezier(.22,1,.36,1) both;
    }

    .handle {
      font-size: 0.875rem;
      color: var(--muted);
      text-align: center;
      margin-top: 4px;
      letter-spacing: 0.02em;
      animation: fadeDown 0.7s 0.15s cubic-bezier(.22,1,.36,1) both;
    }

    .bio {
      font-size: 0.875rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.65;
      margin-top: 12px;
      max-width: 300px;
      animation: fadeDown 0.7s 0.2s cubic-bezier(.22,1,.36,1) both;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 28px 0;
      animation: fadeDown 0.7s 0.25s cubic-bezier(.22,1,.36,1) both;
    }

    /* Cards */
    .cards {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      position: relative;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
      transition: transform 0.25s cubic-bezier(.22,1,.36,1),
                  border-color 0.25s ease,
                  box-shadow 0.25s ease;
      backdrop-filter: blur(12px);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: inherit;
    }

    .card:hover {
      transform: translateY(-3px) scale(1.01);
    }

    .card:active {
      transform: translateY(0) scale(0.99);
      transition-duration: 0.1s;
    }

    /* Per-platform accent */
    .card.wa  { --accent: var(--wa);   --glow: var(--glow-wa); }
    .card.ig  { --accent: var(--ig);   --glow: var(--glow-ig); }
    .card.tt  { --accent: var(--tt);   --glow: var(--glow-tt); }
    .card.wach{ --accent: var(--wach); --glow: var(--glow-wach); }

    .card:hover {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    .card::before {
      background: radial-gradient(ellipse 80% 60% at 0% 50%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 70%);
    }
    .card:hover::before { opacity: 1; }

    /* Icon bubble */
    .icon-bubble {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.3s ease;
    }

    .card:hover .icon-bubble {
      background: color-mix(in srgb, var(--accent) 25%, transparent);
    }

    .icon-bubble svg {
      width: 22px;
      height: 22px;
      fill: var(--accent);
      flex-shrink: 0;
    }

    .card-text { flex: 1; min-width: 0; }
    .card-label {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.975rem;
      letter-spacing: -0.01em;
    }
    .card-sublabel {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arrow {
      opacity: 0.3;
      transition: opacity 0.25s, transform 0.25s;
      flex-shrink: 0;
    }
    .card:hover .arrow {
      opacity: 0.9;
      transform: translateX(3px);
    }

    /* Staggered entry */
    .card:nth-child(1) { animation: fadeUp 0.6s 0.3s cubic-bezier(.22,1,.36,1) both; }
    .card:nth-child(2) { animation: fadeUp 0.6s 0.4s cubic-bezier(.22,1,.36,1) both; }
    .card:nth-child(3) { animation: fadeUp 0.6s 0.5s cubic-bezier(.22,1,.36,1) both; }
    .card:nth-child(4) { animation: fadeUp 0.6s 0.6s cubic-bezier(.22,1,.36,1) both; }

    @keyframes fadeUp   { from { opacity:0; transform: translateY(22px); } to { opacity:1; transform: none; } }
    @keyframes fadeDown { from { opacity:0; transform: translateY(-14px); } to { opacity:1; transform: none; } }

    /* Footer */
    .footer {
      margin-top: 44px;
      font-size: 0.72rem;
      color: rgba(240,238,232,0.2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: fadeDown 0.7s 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      transform: scale(0);
      animation: rippleAnim 0.5s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }
  </style>
</head>

  <script>
    function ripple(e) {
      const card = e.currentTarget;
      const circle = document.createElement('span');
      const diameter = Math.max(card.clientWidth, card.clientHeight);
      const rect = card.getBoundingClientRect();
      circle.style.width = circle.style.height = diameter + 'px';
      circle.style.left = (e.clientX - rect.left - diameter / 2) + 'px';
      circle.style.top  = (e.clientY - rect.top  - diameter / 2) + 'px';
      circle.classList.add('ripple');
      const existing = card.querySelector('.ripple');
      if (existing) existing.remove();
      card.appendChild(circle);
    }
  </script>
